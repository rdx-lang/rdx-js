name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag against package.json
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          PKG_VERSION=$(jq -r '.version' packages/types/package.json)

          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format '$TAG'. Expected: vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi

          TAG_BASE="${BASH_REMATCH[1]}"
          PKG_BASE=$(echo "$PKG_VERSION" | grep -oP '^\d+\.\d+\.\d+')

          if [[ "$TAG_BASE" != "$PKG_BASE" ]]; then
            echo "::error::Base version mismatch! Tag '$TAG_BASE' != package.json '$PKG_BASE'"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  ci:
    name: CI
    needs: validate-version
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync versions from tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          for pkg in packages/types/package.json packages/core/package.json packages/github/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$pkg" > tmp.json && mv tmp.json "$pkg"
            echo "Set $pkg version to $VERSION"
          done
          # Update workspace:* references to actual version
          for pkg in packages/core/package.json packages/github/package.json; do
            jq --arg v "$VERSION" '
              (.dependencies // {}) |= with_entries(if .value == "workspace:*" then .value = $v else . end)
            ' "$pkg" > tmp.json && mv tmp.json "$pkg"
          done

      - name: Build
        run: bun run build

      # Publish in dependency order: types → core → github
      - name: Publish @rdx-lang/types
        working-directory: packages/types
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rdx-lang/core
        working-directory: packages/core
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rdx-lang/github
        working-directory: packages/github
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
